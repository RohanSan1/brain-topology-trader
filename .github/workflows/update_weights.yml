name: Nightly Weight Update

on:
  schedule:
    - cron: "0 22 * * 1-5"    # 22:00 UTC = 3:30 AM IST, Mon-Fri
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Lightning CLI
        run: |
          pip install lightning-sdk
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Start Studio on free CPU machine
        env:
          LIGHTNING_USER_ID: ${{ secrets.LIGHTNING_USER_ID }}
          LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
        run: |
          lightning studios start \
            --name brain-topology-trader \
            --teamspace juy595711-org/deploy-model-project \
            --machine CPU

      - name: Wait for Studio to be ready
        run: sleep 45

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTNING_SSH_PRIVATE_KEY }}" > ~/.ssh/lightning_rsa
          chmod 600 ~/.ssh/lightning_rsa
          echo "Host ssh.lightning.ai
            StrictHostKeyChecking no
            UserKnownHostsFile=/dev/null
            IdentityFile ~/.ssh/lightning_rsa
            IdentitiesOnly yes" > ~/.ssh/config

      - name: Sync repo to Studio
        run: |
          ssh -i ~/.ssh/lightning_rsa -o StrictHostKeyChecking=no \
            s_01kxwct4vhkgz2hg55xkcejvb0@ssh.lightning.ai \
            "cd /teamspace/studios/this_studio && \
             if [ -d brain-topology-trader ]; then \
               cd brain-topology-trader && git pull origin main; \
             else \
               git clone https://github.com/Rohan5commit/brain-topology-trader.git; \
             fi"

      - name: Run weight update
        run: |
          ssh -i ~/.ssh/lightning_rsa -o StrictHostKeyChecking=no \
            s_01kxwct4vhkgz2hg55xkcejvb0@ssh.lightning.ai \
            "cd /teamspace/studios/this_studio/brain-topology-trader && \
             pip install -q torch ncps alpaca-py pandas numpy requests pyarrow scikit-learn yfinance 2>/dev/null && \
             TWELVE_DATA_KEY_1='${{ secrets.TWELVE_DATA_KEY_1 }}' \
             TWELVE_DATA_KEY_2='${{ secrets.TWELVE_DATA_KEY_2 }}' \
             TWELVE_DATA_KEY_3='${{ secrets.TWELVE_DATA_KEY_3 }}' \
             TWELVE_DATA_KEY_4='${{ secrets.TWELVE_DATA_KEY_4 }}' \
             TWELVE_DATA_KEY_5='${{ secrets.TWELVE_DATA_KEY_5 }}' \
             TWELVE_DATA_KEY_6='${{ secrets.TWELVE_DATA_KEY_6 }}' \
             TWELVE_DATA_KEY_7='${{ secrets.TWELVE_DATA_KEY_7 }}' \
             TWELVE_DATA_KEY_8='${{ secrets.TWELVE_DATA_KEY_8 }}' \
             DATA_DIR='/teamspace/studios/this_studio/data' \
             python update_weights.py"

      - name: Stop Studio
        if: always()
        env:
          LIGHTNING_USER_ID: ${{ secrets.LIGHTNING_USER_ID }}
          LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
        run: |
          lightning studios stop \
            --name brain-topology-trader \
            --teamspace juy595711-org/deploy-model-project
