name: Nightly Weight Update

on:
  schedule:
    - cron: "0 22 * * 1-5"    # 22:00 UTC = 3:30 AM IST, Mon-Fri
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install torch ncps pandas numpy requests pyarrow scikit-learn yfinance

      - name: Restore daily state from inference run
        uses: actions/download-artifact@v4
        with:
          name: daily-state
          path: run_data/
        continue-on-error: true

      - name: Run weight update
        env:
          TWELVE_DATA_KEY_1: ${{ secrets.TWELVE_DATA_KEY_1 }}
          TWELVE_DATA_KEY_2: ${{ secrets.TWELVE_DATA_KEY_2 }}
          TWELVE_DATA_KEY_3: ${{ secrets.TWELVE_DATA_KEY_3 }}
          TWELVE_DATA_KEY_4: ${{ secrets.TWELVE_DATA_KEY_4 }}
          TWELVE_DATA_KEY_5: ${{ secrets.TWELVE_DATA_KEY_5 }}
          TWELVE_DATA_KEY_6: ${{ secrets.TWELVE_DATA_KEY_6 }}
          TWELVE_DATA_KEY_7: ${{ secrets.TWELVE_DATA_KEY_7 }}
          TWELVE_DATA_KEY_8: ${{ secrets.TWELVE_DATA_KEY_8 }}
          DATA_DIR: run_data
          WEIGHTS_DIR: weights
        run: python update_weights.py

      - name: Save updated state (includes new online weights)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-state
          path: run_data/
          retention-days: 7
          overwrite: true
