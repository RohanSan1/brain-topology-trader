name: Daily Inference + Trade Execution

on:
  schedule:
    - cron: "30 17 * * 1-5"   # 17:30 UTC = 11:00 PM IST, Mon-Fri
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install torch ncps alpaca-py pandas numpy requests pyarrow scikit-learn yfinance finnhub-python

      - name: Restore daily state from last run
        uses: actions/download-artifact@v4
        with:
          name: daily-state
          path: run_data/
        continue-on-error: true   # first run has no artifact yet

      - name: Run inference
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
          TWELVE_DATA_KEY_1: ${{ secrets.TWELVE_DATA_KEY_1 }}
          TWELVE_DATA_KEY_2: ${{ secrets.TWELVE_DATA_KEY_2 }}
          TWELVE_DATA_KEY_3: ${{ secrets.TWELVE_DATA_KEY_3 }}
          TWELVE_DATA_KEY_4: ${{ secrets.TWELVE_DATA_KEY_4 }}
          TWELVE_DATA_KEY_5: ${{ secrets.TWELVE_DATA_KEY_5 }}
          TWELVE_DATA_KEY_6: ${{ secrets.TWELVE_DATA_KEY_6 }}
          TWELVE_DATA_KEY_7: ${{ secrets.TWELVE_DATA_KEY_7 }}
          TWELVE_DATA_KEY_8: ${{ secrets.TWELVE_DATA_KEY_8 }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          DATA_DIR: run_data
          WEIGHTS_DIR: weights
        run: python run_inference.py

      - name: Save daily state for next run
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-state
          path: run_data/
          retention-days: 7
          overwrite: true
